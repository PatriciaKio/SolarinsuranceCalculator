<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Insurance & System Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .result-box {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card rounded-3xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Solar Insurance Estimator</h1>
            <p class="text-gray-500 text-sm">Based on household size and system capacity</p>
        </div>

        <div class="space-y-6">
            <div>
                <label for="people" class="block text-sm font-medium text-gray-700 mb-2">
                    Number of People
                </label>
                <div class="relative">
                    <input 
                        type="number" 
                        id="people" 
                        placeholder="e.g. 8" 
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                        min="1"
                        oninput="calculate()"
                    >
                    <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                </div>
            </div>

            <div id="results" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-3 bg-blue-50 rounded-xl">
                        <p class="text-xs text-blue-600 font-semibold uppercase tracking-wider">System Size</p>
                        <p id="system-size" class="text-lg font-bold text-blue-900">-</p>
                    </div>
                    <div class="p-3 bg-blue-50 rounded-xl">
                        <p class="text-xs text-blue-600 font-semibold uppercase tracking-wider">Est. Cost</p>
                        <p id="cost" class="text-lg font-bold text-blue-900">-</p>
                    </div>
                </div>

                <div id="insurance-card" class="p-5 rounded-2xl flex items-center justify-between border">
                    <div>
                        <p class="text-sm font-medium opacity-80" id="insurance-label">Insurance Required?</p>
                        <p id="insurance-status" class="text-xl font-black uppercase tracking-tight">-</p>
                    </div>
                    <div id="status-icon"></div>
                </div>

                <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <div class="flex justify-between text-xs text-gray-500 mb-1">
                        <span>Capacity: <span id="capacity" class="font-medium"></span></span>
                        <span>50% Use: <span id="monthly-use" class="font-medium"></span> KWH</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-1.5">
                        <div id="progress-bar" class="bg-blue-600 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div id="empty-state" class="text-center py-10">
                <div class="bg-gray-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                </div>
                <p class="text-gray-400 text-sm italic">Enter the number of people to see the calculation.</p>
            </div>
        </div>
        
        <div class="mt-8 pt-6 border-t border-gray-100 text-[10px] text-gray-400 text-center uppercase tracking-widest">
            Threshold: Cost > $10,000
        </div>
    </div>

    <script>
        function calculate() {
            const peopleInput = document.getElementById('people');
            const numPeople = parseFloat(peopleInput.value);
            const resultsDiv = document.getElementById('results');
            const emptyState = document.getElementById('empty-state');

            if (isNaN(numPeople) || numPeople <= 0) {
                resultsDiv.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            resultsDiv.classList.remove('hidden');
            emptyState.classList.add('hidden');

            /**
             * Linear Regression derived from provided CSV data:
             * Capacity (y) ≈ 0.33 * People + 1.2
             * Cost (y) ≈ 1040 * People - 200
             * System Size (y) ≈ 0.36 * People + 0.4
             * Monthly Use 50% (y) ≈ 54 * People + 20
             */
            
            const capacity = Math.max(1, Math.round(0.33 * numPeople + 1.2));
            const systemSize = (0.36 * numPeople + 0.4).toFixed(1);
            const monthly50 = Math.round(54 * numPeople + 20);
            const cost = Math.round(1040 * numPeople - 200);
            const needsInsurance = cost > 10000;

            // Update UI
            document.getElementById('capacity').innerText = capacity;
            document.getElementById('system-size').innerText = systemSize + ' KW';
            document.getElementById('monthly-use').innerText = monthly50;
            document.getElementById('cost').innerText = '$' + cost.toLocaleString();
            
            const statusText = document.getElementById('insurance-status');
            const insuranceCard = document.getElementById('insurance-card');
            const statusIcon = document.getElementById('status-icon');
            const progressBar = document.getElementById('progress-bar');

            // Progress bar based on cost threshold (10k)
            const progress = Math.min(100, (cost / 15000) * 100);
            progressBar.style.width = progress + '%';

            if (needsInsurance) {
                statusText.innerText = 'YES';
                statusText.className = 'text-2xl font-black text-red-600 uppercase tracking-tight';
                insuranceCard.className = 'p-5 rounded-2xl flex items-center justify-between border border-red-200 bg-red-50';
                statusIcon.innerHTML = `
                    <div class="bg-red-500 p-2 rounded-full text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    </div>
                `;
            } else {
                statusText.innerText = 'NO';
                statusText.className = 'text-2xl font-black text-green-600 uppercase tracking-tight';
                insuranceCard.className = 'p-5 rounded-2xl flex items-center justify-between border border-green-200 bg-green-50';
                statusIcon.innerHTML = `
                    <div class="bg-green-500 p-2 rounded-full text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
